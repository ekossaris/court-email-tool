<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Court Calendar Email Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a365d, #2b6cb0); color: white; padding: 24px 32px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header .logo { font-size: 32px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .container { max-width: 1120px; margin: 32px auto; padding: 0 20px; }
  .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 28px; margin-bottom: 24px; }
  .card h2 { font-size: 16px; font-weight: 700; color: #1a365d; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  textarea { width: 100%; padding: 14px; border: 2px dashed #cbd5e0; border-radius: 8px; font-family: monospace; font-size: 13px; resize: vertical; background: #f7fafc; transition: border-color 0.2s; min-height: 160px; }
  textarea:focus { outline: none; border-color: #2b6cb0; background: white; }
  .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-top: 12px; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 12px; font-weight: 700; color: #4a5568; text-transform: uppercase; letter-spacing: 0.4px; }
  input[type="date"], input[type="text"], input[type="email"] { padding: 9px 12px; border: 1.5px solid #cbd5e0; border-radius: 7px; font-size: 14px; color: #2d3748; background: white; }
  input:focus { outline: none; border-color: #2b6cb0; }
  .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
  .btn-primary { background: linear-gradient(135deg, #2b6cb0, #1a365d); color: white; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(43,108,176,0.35); }
  .btn-secondary { background: #edf2f7; color: #2d3748; border: 1.5px solid #cbd5e0; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-green { background: linear-gradient(135deg, #38a169, #276749); color: white; }
  .btn-green:hover { transform: translateY(-1px); }
  .btn-outline { background: white; color: #2b6cb0; border: 1.5px solid #2b6cb0; }
  .btn-outline:hover { background: #ebf8ff; }
  .btn-red { background: white; color: #e53e3e; border: 1.5px solid #feb2b2; font-size: 12px; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-weight: 700; }
  .btn-red:hover { background: #fff5f5; }
  .btn-ghost { background: none; border: none; color: #718096; font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .btn-ghost:hover { background: #edf2f7; color: #e53e3e; }

  /* Stats */
  .stats { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .stat-box { background: #ebf8ff; border: 1.5px solid #bee3f8; border-radius: 8px; padding: 10px 18px; text-align: center; }
  .stat-box .num { font-size: 24px; font-weight: 800; color: #2b6cb0; }
  .stat-box .lbl { font-size: 11px; color: #4a5568; font-weight: 700; text-transform: uppercase; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #1a365d; color: white; }
  thead th { padding: 10px 12px; text-align: left; font-weight: 600; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #e2e8f0; }
  tbody tr:hover { background: #f0f7ff; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700; }
  .badge-blue { background: #bee3f8; color: #1a365d; }
  .badge-green { background: #c6f6d5; color: #276749; }
  .badge-gray { background: #e2e8f0; color: #4a5568; }
  .badge-orange { background: #feebc8; color: #7b341e; }

  /* Email cards */
  .email-item { border: 1.5px solid #e2e8f0; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .email-item.has-contact { border-color: #9ae6b4; }
  .email-item-header { background: #f7fafc; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; gap: 12px; flex-wrap: wrap; }
  .email-item-header:hover { background: #edf2f7; }
  .eii { flex: 1; min-width: 0; }
  .eii .case-name { font-weight: 700; font-size: 14px; color: #1a365d; }
  .eii .firm-line { font-size: 12px; color: #718096; margin-top: 2px; }
  .eii .email-status { font-size: 12px; margin-top: 4px; }
  .email-body { display: none; padding: 20px; border-top: 1px solid #e2e8f0; }
  .email-body.open { display: block; }
  .email-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .email-preview {
    background: #ffffff;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    padding: 32px 36px;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 14.5px;
    line-height: 1.8;
    color: #1a202c;
    margin-top: 12px;
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.04);
  }
  .email-preview .ep-header {
    text-align: center;
    border-bottom: 2px solid #1a365d;
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .email-preview .ep-title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #1a365d;
    text-transform: uppercase;
  }
  .email-preview .ep-re {
    background: #f7fafc;
    border-left: 4px solid #2b6cb0;
    padding: 14px 18px;
    margin: 18px 0;
    border-radius: 0 6px 6px 0;
    font-size: 14px;
  }
  .email-preview .ep-re .re-label {
    font-weight: 700;
    color: #2b6cb0;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .email-preview .ep-re .re-line {
    color: #2d3748;
    line-height: 1.7;
  }
  .email-preview .ep-re .re-case {
    font-weight: 700;
    color: #1a365d;
    font-size: 15px;
  }
  .email-preview .ep-body {
    color: #2d3748;
    font-size: 14.5px;
    line-height: 1.85;
    text-align: justify;
  }
  .email-preview .ep-body p {
    margin-bottom: 14px;
    text-indent: 0;
  }
  .email-preview .ep-sig {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #e2e8f0;
    font-style: italic;
    color: #4a5568;
    font-size: 14px;
  }
  .email-meta { font-size: 13px; color: #4a5568; padding-bottom: 10px; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; }
  .email-meta strong { color: #1a365d; }

  /* Contact book */
  .tabs { display: flex; border-bottom: 2px solid #e2e8f0; }
  .tab { padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; color: #718096; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }
  .tab-content { display: none; padding-top: 20px; }
  .tab-content.active { display: block; }

  /* Email pill list in contact form */
  .email-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; min-height: 28px; }
  .pill { display: inline-flex; align-items: center; gap: 5px; background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 20px; padding: 3px 10px 3px 12px; font-size: 13px; color: #1a365d; }
  .pill button { background: none; border: none; color: #718096; cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
  .pill button:hover { color: #e53e3e; }

  .contact-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; background: white; }
  .contact-row:hover { background: #f7fafc; }
  .contact-info { flex: 1; }
  .contact-info .cname { font-weight: 700; font-size: 14px; color: #1a365d; }
  .contact-info .cemails { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 5px; }
  .contact-info .cphone { font-size: 12px; color: #718096; margin-top: 4px; }
  .contact-count { background: #e2e8f0; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; color: #4a5568; }

  .empty-state { text-align: center; padding: 40px 20px; color: #a0aec0; }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
  .alert-success { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
  .alert-error { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
  .section-actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .count-badge { background: #2b6cb0; color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
  .outlook-bar { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 32px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .outlook-bar .ob-label { font-size: 13px; font-weight: 600; color: #4a5568; }
  .btn-msft { background: #0078d4; color: white; border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.2s; }
  .btn-msft:hover { background: #106ebe; }
  .btn-msft-disconnect { background: white; color: #e53e3e; border: 1.5px solid #feb2b2; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .btn-msft-disconnect:hover { background: #fff5f5; }
  .outlook-status { font-size: 13px; font-weight: 600; }
  .outlook-status.connected { color: #38a169; }
  .outlook-status.disconnected { color: #a0aec0; }
  .btn-drafts { background: linear-gradient(135deg, #0078d4, #005a9e); color: white; font-size: 12px; padding: 7px 14px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; }
  .btn-drafts:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,120,212,0.4); }
  .btn-drafts:disabled { background: #a0aec0; cursor: not-allowed; transform: none; box-shadow: none; }
</head>
<body>

<header>
  <div class="logo">⚖️</div>
  <div>
    <h1>Court Calendar Email Generator</h1>
    <p>Queens Supreme Court — TSP Coverage Outreach Tool</p>
  </div>
</header>

<!-- OUTLOOK CONNECTION BAR -->
<div class="outlook-bar">
  <span class="ob-label">📧 Outlook:</span>
  <div id="outlookDisconnected" style="display:flex;align-items:center;gap:10px;">
    <span class="outlook-status disconnected">Not connected</span>
    <button class="btn-msft" onclick="outlookSignIn()">
      <svg width="16" height="16" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
  </div>
  <div id="outlookConnected" style="display:none;align-items:center;gap:10px;">
    <span class="outlook-status connected">✅ Connected as <span id="outlookUserName"></span></span>
    <button class="btn-drafts" onclick="saveAllToDrafts()">📥 Save All to Drafts</button>
    <button class="btn-msft-disconnect" onclick="outlookSignOut()">Disconnect</button>
  </div>
  <span id="outlookBarMsg" style="font-size:12px;color:#718096;"></span>
</div>

<!-- CLIENT ID SETUP (shown if not configured) -->
<div id="clientIdSetup" class="container" style="margin-top:20px;display:none;">
  <div class="card" style="border:2px solid #fbd38d;background:#fffbeb;">
    <h2 style="color:#b7791f;">⚙️ One-Time Microsoft Setup Required</h2>
    <p style="font-size:14px;color:#744210;margin-bottom:16px;line-height:1.7;">To connect to Outlook, you need a free Microsoft Azure App Client ID. This takes about 2 minutes to set up — <strong>you only do this once</strong>.</p>
    <ol style="font-size:14px;color:#744210;line-height:2;margin-left:20px;margin-bottom:16px;">
      <li>Go to <a href="https://portal.azure.com" target="_blank" style="color:#2b6cb0;font-weight:700;">portal.azure.com</a> and sign in with your Microsoft account</li>
      <li>Search for <strong>"App registrations"</strong> → click <strong>"New registration"</strong></li>
      <li>Name it anything (e.g. <em>Court Email Tool</em>), select <strong>"Personal Microsoft accounts only"</strong></li>
      <li>Under <strong>Redirect URI</strong>, select <strong>Single-page application (SPA)</strong> and enter: <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;">https://localhost</code></li>
      <li>Click <strong>Register</strong> — copy the <strong>Application (client) ID</strong></li>
      <li>Paste it below and click Save</li>
    </ol>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="fg">
        <label>Microsoft App Client ID</label>
        <input type="text" id="clientIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" style="width:340px;font-family:monospace;">
      </div>
      <button class="btn btn-primary" onclick="saveClientId()">💾 Save & Connect</button>
    </div>
    <div id="clientIdAlert"></div>
  </div>
</div>

<div class="container">

  <!-- CONTACT BOOK -->
  <div class="card">
    <h2>📒 Contact Book <span id="contactCountBadge" class="contact-count">0 firms</span></h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('add')">➕ Add / Edit Contact</div>
      <div class="tab" onclick="switchTab('view')">📋 View All Contacts</div>
      <div class="tab" onclick="switchTab('excluded')">🚫 Excluded Firms</div>
      <div class="tab" onclick="switchTab('importexport')">📤 Import / Export</div>
    </div>

    <!-- ADD TAB -->
    <div id="tab-add" class="tab-content active">
      <div class="row" style="margin-top:0; align-items:flex-start;">
        <div class="fg">
          <label>Firm / Attorney Name *</label>
          <input type="text" id="newFirmName" placeholder="e.g. Baker, McEvoy & Moskovits, P.C." style="width:310px;">
        </div>
        <div class="fg">
          <label>Phone (optional)</label>
          <input type="text" id="newFirmPhone" placeholder="(718) 555-1234" style="width:160px;">
        </div>
      </div>

      <div style="margin-top:16px;">
        <label style="font-size:12px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.4px;">Email Addresses *</label>
        <p class="hint">Add one or more emails. All will be CC'd on each Outlook email.</p>
        <div class="row" style="margin-top:8px;">
          <input type="email" id="newEmailInput" placeholder="attorney@lawfirm.com" style="width:280px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addEmailPill();}">
          <button class="btn btn-secondary" onclick="addEmailPill()">+ Add Email</button>
        </div>
        <div class="email-pills" id="emailPills"></div>
      </div>

      <div class="row" style="margin-top:16px;">
        <button class="btn btn-primary" onclick="saveContact()">💾 Save Contact</button>
        <button class="btn btn-secondary" onclick="clearContactForm()">Clear</button>
      </div>
      <div id="addContactAlert"></div>
    </div>

    <!-- VIEW TAB -->
    <div id="tab-view" class="tab-content">
      <div style="margin-bottom:14px;">
        <input type="text" id="contactSearch" placeholder="🔍 Search contacts..." oninput="renderContacts()" style="width:300px;padding:9px 12px;border:1.5px solid #cbd5e0;border-radius:7px;font-size:14px;">
      </div>
      <div id="contactsList"><div class="empty-state"><div class="icon">📭</div><p>No contacts yet.</p></div></div>
    </div>

    <!-- EXCLUDED FIRMS TAB -->
    <div id="tab-excluded" class="tab-content">
      <p class="hint" style="margin-bottom:14px;">Firms on this list will be silently skipped when generating emails — no email will be created for them regardless of whether they appear in the calendar.</p>
      <div class="row" style="margin-top:0; margin-bottom:18px;">
        <div class="fg">
          <label>Firm / Attorney Name to Exclude</label>
          <input type="text" id="newExcludedFirm" placeholder="e.g. KELLY RODE & KELLY LLP" style="width:340px;" onkeydown="if(event.key==='Enter'){event.preventDefault();addExclusion();}">
        </div>
        <button class="btn btn-primary" onclick="addExclusion()">🚫 Add to Exclusion List</button>
      </div>
      <div id="excludedAlert"></div>
      <div id="excludedList"><div class="empty-state"><div class="icon">✅</div><p>No firms excluded — emails will be generated for all active attorneys.</p></div></div>
    </div>

    <!-- IMPORT / EXPORT TAB -->
    <div id="tab-importexport" class="tab-content">

      <!-- EXPORT -->
      <div style="margin-bottom:28px;">
        <h3 style="font-size:14px;font-weight:700;color:#1a365d;margin-bottom:8px;">📥 Export Contacts</h3>
        <p class="hint" style="margin-bottom:12px;">Download your contact list as a CSV file you can open in Excel, or as a JSON backup.</p>
        <div class="row" style="margin-top:0;">
          <button class="btn btn-primary" onclick="exportCSV()">⬇️ Download as CSV (Excel)</button>
          <button class="btn btn-secondary" onclick="exportJSON()">⬇️ Download as JSON (Backup)</button>
        </div>
      </div>

      <!-- IMPORT CSV -->
      <div style="border-top:1px solid #e2e8f0;padding-top:22px;margin-bottom:28px;">
        <h3 style="font-size:14px;font-weight:700;color:#1a365d;margin-bottom:8px;">📤 Import from CSV</h3>
        <p class="hint" style="margin-bottom:4px;">CSV must have columns: <code style="background:#edf2f7;padding:1px 5px;border-radius:4px;font-size:12px;">name, emails, phone</code></p>
        <p class="hint" style="margin-bottom:12px;">For multiple emails in one row, separate them with a pipe character: <code style="background:#edf2f7;padding:1px 5px;border-radius:4px;font-size:12px;"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="6a0f070b03065b2a0c03180744090507">[email&#160;protected]</a>|<a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="afcac2cec6c39defc9c6ddc281ccc0c2">[email&#160;protected]</a></code></p>
        <div class="row" style="margin-top:0;">
          <input type="file" id="csvFileInput" accept=".csv" style="font-size:13px;">
          <button class="btn btn-primary" onclick="importCSV()">📤 Import CSV</button>
        </div>
        <div id="importCSVAlert"></div>
      </div>

      <!-- IMPORT JSON -->
      <div style="border-top:1px solid #e2e8f0;padding-top:22px;">
        <h3 style="font-size:14px;font-weight:700;color:#1a365d;margin-bottom:8px;">📤 Restore from JSON Backup</h3>
        <p class="hint" style="margin-bottom:12px;">Select a previously exported JSON backup file to restore your contacts. This will <strong>merge</strong> with existing contacts.</p>
        <div class="row" style="margin-top:0;">
          <input type="file" id="jsonFileInput" accept=".json" style="font-size:13px;">
          <button class="btn btn-primary" onclick="importJSON()">📤 Restore JSON</button>
        </div>
        <div id="importJSONAlert"></div>
      </div>

    </div>
  </div>

  <!-- STEP 1 -->
  <div class="card">
    <h2>📋 Step 1: Paste Calendar Data</h2>
    <textarea id="calendarInput" placeholder="Paste the WebCivil calendar results here..."></textarea>
    <div class="row">
      <div class="fg">
        <label>Hearing Date</label>
        <input type="date" id="hearingDate">
      </div>
      <div class="fg">
        <label>Signatory</label>
        <input type="text" id="signatoryName" value="Emmanuel (Manny) Kossaris, Esq." style="width:260px;">
      </div>
      <div class="fg">
        <label>Office Tel</label>
        <input type="text" id="officePhone" value="718 777-0692" style="width:130px;">
      </div>
      <div class="fg">
        <label>Mobile</label>
        <input type="text" id="mobilePhone" value="917 417-6232" style="width:130px;">
      </div>
      <div class="fg">
        <label>Fee</label>
        <input type="text" id="feeAmount" value="$125" style="width:80px;">
      </div>
      <button class="btn btn-primary" style="padding:10px 24px;font-size:14px;" onclick="parseAndGenerate()">⚡ Parse & Generate Emails</button>
    </div>
    <div id="parseAlert"></div>
  </div>

  <!-- EDITABLE TEMPLATE -->
  <div class="card">
    <h2>✏️ Email Template <span style="font-size:12px;font-weight:400;color:#718096;margin-left:8px;">Edit wording below — use <code style="background:#edf2f7;padding:1px 5px;border-radius:3px;">[PLACEHOLDERS]</code> to insert dynamic values</span></h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:12px;color:#718096;align-items:center;">
      <span>Available placeholders:</span>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[DATE]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[TIME]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[INDEX]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[CASE]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[FEE]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[SIGNATORY]</code>
      <code style="background:#edf2f7;padding:2px 7px;border-radius:4px;">[OFFICE]</code>

// ── Microsoft Graph / Outlook Integration ─────────────────────────────────────
let outlookToken = null;
let outlookUser = null;
const GRAPH_SCOPES = 'Mail.ReadWrite User.Read';

function getMsClientId() {
  return localStorage.getItem('kossaris_ms_client_id') || '';
}

function saveClientId() {
  const id = document.getElementById('clientIdInput').value.trim();
  if (!id || id.length < 30) {
    showAlert('clientIdAlert','error','⚠️ Please enter a valid Client ID.');
    return;
  }
  localStorage.setItem('kossaris_ms_client_id', id);
  document.getElementById('clientIdSetup').style.display = 'none';
  outlookSignIn(id);
}

function outlookSignIn(clientId) {
  clientId = clientId || getMsClientId();
  if (!clientId) {
    document.getElementById('clientIdSetup').style.display = 'block';
    document.getElementById('clientIdSetup').scrollIntoView({behavior:'smooth'});
    return;
  }
  // Store current state so we can restore after redirect
  localStorage.setItem('kossaris_oauth_pending', '1');
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: 'token',
    redirect_uri: 'https://localhost',
    scope: GRAPH_SCOPES,
    response_mode: 'fragment',
    nonce: Math.random().toString(36).slice(2)
  });
  const authUrl = `https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?${params}`;
  // Open in popup
  const popup = window.open(authUrl, 'msauth', 'width=500,height=650,left=200,top=100');
  // Poll for redirect
  const timer = setInterval(() => {
    try {
      const url = popup.location.href;
      if (url.startsWith('https://localhost')) {
        clearInterval(timer);
        popup.close();
        const hash = url.includes('#') ? url.split('#')[1] : '';
        const hashParams = new URLSearchParams(hash);
        const token = hashParams.get('access_token');
        if (token) {
          outlookToken = token;
          fetchOutlookUser(token);
        } else {
          setOutlookBarMsg('⚠️ Sign-in failed or was cancelled.');
        }
      }
    } catch(e) {
      // Cross-origin — still on Microsoft page, keep waiting
    }
    if (popup.closed && !outlookToken) {
      clearInterval(timer);
      setOutlookBarMsg('⚠️ Sign-in window was closed.');
    }
  }, 500);
}

async function fetchOutlookUser(token) {
  try {
    const resp = await fetch('https://graph.microsoft.com/v1.0/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await resp.json();
    outlookUser = data.userPrincipalName || data.mail || data.displayName;
    updateOutlookUI(true);
  } catch(e) {
    setOutlookBarMsg('⚠️ Could not fetch user info.');
  }
}

function outlookSignOut() {
  outlookToken = null;
  outlookUser = null;
  updateOutlookUI(false);
}

function updateOutlookUI(connected) {
  document.getElementById('outlookDisconnected').style.display = connected ? 'none' : 'flex';
  document.getElementById('outlookConnected').style.display = connected ? 'flex' : 'none';
  if (connected && outlookUser) {
    document.getElementById('outlookUserName').textContent = outlookUser;
  }
  setOutlookBarMsg('');
}

function setOutlookBarMsg(msg) {
  document.getElementById('outlookBarMsg').textContent = msg;
}

async function saveDraftToOutlook(entry, token) {
  const toRecipients = entry.contact
    ? entry.contact.emails.map(e => ({ emailAddress: { address: e } }))
    : [];
  const draft = {
    subject: buildSubject(entry),
    body: { contentType: 'Text', content: buildBody(entry) },
    toRecipients
  };
  const resp = await fetch('https://graph.microsoft.com/v1.0/me/messages', {
    method: 'POST',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(draft)
  });
  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || 'Failed to save draft');
  }
  return await resp.json();
}

async function saveSingleToDrafts(idx) {
  if (!outlookToken) { outlookSignIn(); return; }

      btn.textContent = '📥 Save to Drafts';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);
  } catch(e) {
    btn.textContent = '❌ Failed';
    btn.disabled = false;
    setTimeout(() => { btn.textContent = '📥 Save to Drafts'; }, 3000);
    toast('Error: ' + e.message);
  }
}

async function saveAllToDrafts() {
  if (!outlookToken) { outlookSignIn(); return; }
  if (!generatedEmails.length) { toast('No emails to save.'); return; }
  setOutlookBarMsg('⏳ Saving drafts...');

    let saved = 0;

    }
    setOutlookBarMsg(`✅ ${saved} drafts saved to Outlook!`);
    setTimeout(() => setOutlookBarMsg(''), 6000);
  } catch(e) {
    setOutlookBarMsg('❌ Error: ' + e.message);
  }
}

// ── Import CSV ────────────────────────────────────────────────────────────────
function importCSV() {
  const file = document.getElementById('csvFileInput').files[0];
  if (!file) { showAlert('importCSVAlert','error','⚠️ Please select a CSV file first.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l=>l.trim());
    if (!lines.length) { showAlert('importCSVAlert','error','⚠️ CSV file is empty.'); return; }
    // Detect header
    const startIdx = lines[0].toLowerCase().includes('name') ? 1 : 0;
    let added = 0, skipped = 0;
    for (let i=startIdx; i<lines.length; i++) {
      const cols = parseCSVLine(lines[i]);
      const name = (cols[0]||'').trim();
      const emailsRaw = (cols[1]||'').trim();
      const phone = (cols[2]||'').trim();
      if (!name || !emailsRaw) { skipped++; continue; }
      const emails = emailsRaw.split('|').map(e=>e.trim()).filter(e=>e&&/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e));
      if (!emails.length) { skipped++; continue; }
      contacts[normKey(name)] = { name, emails, phone };
      added++;
    }
    saveContacts();
    document.getElementById('csvFileInput').value = '';
    showAlert('importCSVAlert','success',`✅ Imported ${added} contacts.${skipped?' '+skipped+' rows skipped (missing name or valid email).':''}`);
  };
  reader.readAsText(file);
}

function parseCSVLine(line) {
  // Simple CSV parser that handles quoted fields
  const result = [], re = /(?:^|,)("(?:[^"]|"")*"|[^,]*)/g;
  let m;
  while ((m=re.exec(line))!==null) {
    let v = m[1];
    if (v.startsWith('"') && v.endsWith('"')) v = v.slice(1,-1).replace(/""/g,'"');
    result.push(v);
  }
  return result;
}

      for (const [key,c] of Object.entries(data)) {

}

function lookupContact(firmName) {
  const q = normKey(firmName);
  if (contacts[q]) return contacts[q];
  for (const [key,c] of Object.entries(contacts)) {
    if (q.includes(key)||key.includes(q)) return c;
    const words = key.replace(/[^a-z0-9]/g,' ').split(' ').filter(w=>w.length>3);
    if (words.length && words.every(w=>q.includes(w))) return c;
  }
  return null;
}

function parseAndGenerate() {
  const raw = document.getElementById('calendarInput').value.trim();
  const alertEl = document.getElementById('parseAlert');
  if (!raw) { showAlert('parseAlert','error','⚠️ Please paste calendar data first.'); return; }
  parsedCases = parseCalendarData(raw);
  if (!parsedCases.length) { showAlert('parseAlert','error','⚠️ Could not parse cases. Check the pasted text.'); return; }
  showAlert('parseAlert','success',`✅ Parsed ${parsedCases.length} cases.`);
  renderCasesTable(); generateEmails();
}

function parseCalendarData(text) {
  const cases=[], blocks=text.split(/(?=\d{6,}\/\d{4})/);
  for (const block of blocks) {
    if (!block.trim()) continue;
    const im = block.match(/(\d{6,}\/\d{4})\s*-\s*(.+?)(?:\n|$)/);
    if (!im) continue;
    const g = rx => { const m=block.match(rx); return m?m[1].trim():''; };
    const rawTime = g(/Time:\s*(\d{2}:\d{2})/);
    cases.push({
      indexNum: im[1].trim(), caseName: im[2].trim(),
      time: rawTime ? formatTime(rawTime) : 'No time listed',
      purpose: g(/Court Date Purpose:\s*(.+?)(?:\s*\/|$)/),
      outcome: g(/Outcome:\s*(.+?)(?:\n|$)/),
      plaintiff: g(/Plaintiff Attorney:\s*(.+?)(?:\n|$)/i),
      defendant: g(/Defendant Attorney:\s*(.+?)(?:\n|$)/i),
      justice: g(/Justice:\s*(.+?)(?:\n|$)/),
      remarks: g(/Remarks:\s*(.+?)(?:\n|$)/i)
    });
  }
  return cases;
}

function formatTime(t) {
  const [h,m]=t.split(':').map(Number);
  return `${h>12?h-12:h||12}:${String(m).padStart(2,'0')} ${h>=12?'P.M.':'A.M.'}`;
}

function formatDateLong(s) {
  if (!s) return 'April 8, 2026';
  const [y,mo,d]=s.split('-');
  return `${'January,February,March,April,May,June,July,August,September,October,November,December'.split(',')[+mo-1]} ${+d}, ${y}`;
}

  if(l.includes('continued')) return `<span class="badge badge-blue">Continued</span>`;
  if(l.includes('held')) return `<span class="badge badge-blue">Held</span>`;
  return `<span class="badge badge-gray">${o}</span>`;
}

  document.getElementById('casesCard').style.display='block';
}

function generateEmails() {
  const dateStr=document.getElementById('hearingDate').value;
  const dateLong=formatDateLong(dateStr);
  const signatory=document.getElementById('signatoryName').value||'Emmanuel (Manny) Kossaris, Esq.';
  const officePhone=document.getElementById('officePhone').value||'718 777-0692';
  const mobilePhone=document.getElementById('mobilePhone').value||'917 417-6232';
  const fee=document.getElementById('feeAmount').value||'$125';
  const emailEntries=[];

  parsedCases.forEach(c=>{
    const o=(c.outcome||'').toLowerCase();
    if(o.includes('settled')||o.includes('closed')||o.includes('discontinued')) return;
    if(c.remarks.includes('JURY SELECTION')) return;
    const confType=c.purpose.replace('Conference-','')||'Trial Scheduling';
    [{firm:c.plaintiff,side:'Plaintiff'},{firm:c.defendant,side:'Defendant'}].forEach(({firm,side})=>{
      if(!firm||firm.toLowerCase().includes('pro se')||firm.length<3) return;
      if(isExcluded(firm)) return;
      emailEntries.push({firm,side,case:c,confType,dateLong,signatory,officePhone,mobilePhone,fee,contact:lookupContact(firm)});
    });
  });

  generatedEmails=emailEntries;
  const matched=emailEntries.filter(e=>e.contact).length;
  document.getElementById('emailCount').textContent=`${emailEntries.length} emails`;
  document.getElementById('matchedCount').textContent=matched?`✅ ${matched} auto-matched from contacts`:'';

  const emailsList=document.getElementById('emailsList');
  if(!emailEntries.length){
    emailsList.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No active cases to email.</p></div>';
  } else {
    emailsList.innerHTML='';
    emailEntries.forEach((entry,idx)=>{
      const hc=!!entry.contact;
      const emailList=hc?entry.contact.emails:[];
      const toDisplay=hc
        ?`<span style="color:#38a169;font-weight:700;">📧 ${emailList.map(e=>esc(e)).join(' &nbsp;·&nbsp; ')}</span>`
        :`<span style="color:#e53e3e;">⚠️ No email on file — <a href="#" onclick="event.preventDefault();prefillContact('${esc(entry.firm)}')">Add to contacts ↑</a></span>`;
      const div=document.createElement('div');
      div.className=`email-item${hc?' has-contact':''}`;
      div.innerHTML=`
        <div class="email-item-header" onclick="toggleEmail(${idx})">
          <div class="eii">
            <div class="case-name">${entry.case.indexNum} — ${esc(entry.case.caseName)}</div>
            <div class="firm-line">${esc(entry.firm)} &nbsp;·&nbsp; <strong>${entry.side}</strong> &nbsp;·&nbsp; ${entry.case.time}</div>
            <div class="email-status">${toDisplay}</div>
          </div>
          <div class="email-actions">
            <button class="btn btn-green" onclick="event.stopPropagation();copyEmail(${idx})">📋 Copy</button>
            <button class="btn btn-outline" onclick="event.stopPropagation();openOutlook(${idx})">📧 Open in Outlook</button>
            <button class="btn-drafts" id="draftBtn-${idx}" onclick="event.stopPropagation();saveSingleToDrafts(${idx})" title="Save to Outlook Drafts">📥 Save to Drafts</button>
            <span style="color:#a0aec0;font-size:18px;" id="chev-${idx}">▼</span>
          </div>
        </div>
        <div class="email-body" id="eb-${idx}">
          <div class="email-meta">
            <div><strong>To:</strong> ${hc ? emailList.map(e=>`<span class="pill" style="font-size:12px;">📧 ${esc(e)}</span>`).join(' ') : '<em style="color:#e53e3e">No email on file</em>'}</div>
          </div>
          <div style="font-weight:700;font-size:14px;color:#1a365d;margin-bottom:10px;">Subject: ${esc(buildSubject(entry))}</div>
          <div class="email-preview">${buildHTMLPreview(entry)}</div>
        </div>`;
      emailsList.appendChild(div);
    });
  }
  document.getElementById('emailsCard').style.display='block';
}

function buildSubject(e){
  return `NOTICE OF IN PERSON ${e.confType.toUpperCase()} CONFERENCE — ${e.case.indexNum} — ${e.case.caseName}`;
}

const DEFAULT_TEMPLATE = `Good morning:

Court records indicate that you are the attorney(s) of record for one of the parties in this matter and that an In-Person Trial Conference has been scheduled in said matter at the aforesaid place and time.

For over twenty-seven years, our office has provided Queens Supreme Court Per Diem coverage for hundreds of firms.  Our fee for TSP appearances is [FEE].  Should you require coverage for the above referenced matter, you may email us or contact us at any of the numbers below.  Have a great day.  Thank you.`;

function getTemplate() {
  return document.getElementById('emailTemplate').value.trim() || DEFAULT_TEMPLATE;
}

function applyTemplate(e) {
  return getTemplate()
    .replace(/\[DATE\]/g, e.dateLong)
    .replace(/\[TIME\]/g, e.case.time)
    .replace(/\[INDEX\]/g, e.case.indexNum)
    .replace(/\[CASE\]/g, e.case.caseName)
    .replace(/\[FEE\]/g, e.fee)
    .replace(/\[SIGNATORY\]/g, e.signatory)
    .replace(/\[OFFICE\]/g, e.officePhone)
    .replace(/\[MOBILE\]/g, e.mobilePhone);
}

function resetTemplate() {
  document.getElementById('emailTemplate').value = DEFAULT_TEMPLATE;
  localStorage.removeItem('kossaris_template');
  showTemplateMsg();
}

function saveTemplateToStorage() {
  localStorage.setItem('kossaris_template', document.getElementById('emailTemplate').value);
  showTemplateMsg();
}

function showTemplateMsg() {
  const el = document.getElementById('templateSavedMsg');
  el.style.display = 'inline';
  setTimeout(() => el.style.display = 'none', 2500);
}

function loadTemplate() {
  const saved = localStorage.getItem('kossaris_template');
  document.getElementById('emailTemplate').value = saved || DEFAULT_TEMPLATE;
  // Auto-save on any change
  document.getElementById('emailTemplate').addEventListener('input', () => {
    clearTimeout(window._templateTimer);
    window._templateTimer = setTimeout(saveTemplateToStorage, 800);
  });
}

function buildBody(e){
  const c=e.case;
  const body = applyTemplate(e);
  return `__ NOTICE OF IN PERSON ${e.confType.toUpperCase()} CONFERENCE __

Re:    IN PERSON TSP CONFERENCE
          ${e.dateLong} @ ${c.time}

          ${c.indexNum} — ${c.caseName}
          Supreme Court, Queens County
          Trial Scheduling Part - Room 25

${body}

${e.signatory}
Office:  ${e.officePhone}
Mobile:  ${e.mobilePhone}`;
}

function toggleEmail(idx){
  const b=document.getElementById(`eb-${idx}`),c=document.getElementById(`chev-${idx}`);
  b.classList.toggle('open'); c.textContent=b.classList.contains('open')?'▲':'▼';
}

function copyEmail(idx){
  const e=generatedEmails[idx];
  const toLine=e.contact?`To: ${e.contact.emails.join(', ')}\n`:'';
  navigator.clipboard.writeText(`${toLine}Subject: ${buildSubject(e)}\n\n${buildBody(e)}`).then(()=>toast('Email copied!'));
}

function openOutlook(idx){
  const e=generatedEmails[idx];
  // Put all emails in the To: field (Outlook supports comma-separated)
  const to=e.contact?encodeURIComponent(e.contact.emails.join('; ')):'';
  window.location.href=`mailto:${to}?subject=${encodeURIComponent(buildSubject(e))}&body=${encodeURIComponent(buildBody(e))}`;
}

function copyAllEmails(){
  const all=generatedEmails.map((e,i)=>{
    const toLine=e.contact?`To: ${e.contact.emails.join(', ')}`:' To: (no email on file)';
    return `===== EMAIL ${i+1} =====\n${toLine}\nFirm: ${e.firm} (${e.side})\nSubject: ${buildSubject(e)}\n\n${buildBody(e)}`;
  }).join('\n\n\n');
  navigator.clipboard.writeText(all).then(()=>toast('All emails copied!'));
}

function downloadAll(){
  const all=generatedEmails.map((e,i)=>{
    const toLine=e.contact?`To: ${e.contact.emails.join(', ')}`:' To: (no email on file)';
    return `===== EMAIL ${i+1} =====\n${toLine}\nFirm: ${e.firm} (${e.side})\nSubject: ${buildSubject(e)}\n\n${buildBody(e)}`;
  }).join('\n\n\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([all],{type:'text/plain'}));
  a.download='court_emails.txt'; a.click();
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showAlert(id,type,msg){
  document.getElementById(id).innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
  if(type==='success') setTimeout(()=>{const el=document.getElementById(id); if(el) el.innerHTML='';},4000);
}

  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#2b6cb0;color:white;padding:1
